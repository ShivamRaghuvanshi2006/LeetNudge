<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
  <style>
    body { width: 320px; padding: 24px; background: var(--ln-bg); border: 4px solid var(--ln-border); margin: 0; box-sizing: border-box; }
    .header { text-align: center; margin-bottom: 24px; border-bottom: 4px solid var(--ln-border); padding-bottom: 16px; }
  </style>
</head>
<body class="ln-extension-root">
  <div class="header">
    <h2 style="margin:0 0 8px 0; color: var(--ln-text); font-weight: 900; text-transform: uppercase;">LeetNudge</h2>
    <p style="margin:0; font-size:14px; font-weight: 700; color:var(--ln-text); padding: 4px; border: 2px solid var(--ln-border); display: inline-block; box-shadow: 2px 2px 0px 0px #000;">Performance Tracker Online</p>
  </div>
  <button id="open-dashboard" class="ln-btn ln-btn-primary" style="width:100%; font-size: 16px; padding: 12px;">Open Dashboard</button>
  <script src="popup.js"></script>
</body>
</html>
